name: Build Barretenberg Wrapper

on:
  workflow_dispatch:
  push:
    paths:
      - 'x/zk/barretenberg/wrapper/barretenberg_wrapper.cpp'
      - 'x/zk/barretenberg/wrapper/build-wrapper.sh'
      - 'x/zk/barretenberg/include/**'

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build libbarretenberg.a (linux/amd64)
        run: x/zk/barretenberg/wrapper/build-wrapper.sh --platform linux_amd64

      - uses: actions/upload-artifact@v4
        with:
          name: libbarretenberg-linux-amd64
          path: x/zk/barretenberg/lib/linux_amd64/libbarretenberg.a

  build-darwin-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build libbarretenberg.a (darwin/arm64)
        run: x/zk/barretenberg/wrapper/build-wrapper.sh --platform darwin_arm64

      - uses: actions/upload-artifact@v4
        with:
          name: libbarretenberg-darwin-arm64
          path: x/zk/barretenberg/lib/darwin_arm64/libbarretenberg.a

  build-darwin-amd64:
    runs-on: macos-13  # Intel x86_64 runner — native build, no cross-compilation needed
    steps:
      - uses: actions/checkout@v4

      - name: Build libbarretenberg.a (darwin/amd64)
        # Runs natively on Intel x86_64; barretenberg-static-amd64-darwin.tar.gz is pre-built
        # for Intel. The -target x86_64-apple-macos10.15 flag in build-wrapper.sh is a no-op
        # here (re-asserts the native target) but harmless.
        run: x/zk/barretenberg/wrapper/build-wrapper.sh --platform darwin_amd64

      - uses: actions/upload-artifact@v4
        with:
          name: libbarretenberg-darwin-amd64
          path: x/zk/barretenberg/lib/darwin_amd64/libbarretenberg.a
