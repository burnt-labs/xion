name: Create Release
# Run for new release tags only

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CI checks run in parallel with builds — they don't block each other,
  # but both must pass before the release is created.
  lint:
    name: Golang CI Lint
    uses: ./.github/workflows/golangci-lint.yaml
    secrets: inherit

  update-swagger:
    name: Update Swagger
    uses: ./.github/workflows/update-swagger.yaml
    secrets: inherit

  unit-tests:
    name: Go Unit Tests
    uses: ./.github/workflows/tests.yaml
    secrets: inherit

  build-darwin:
    name: Build Darwin Binaries
    uses: ./.github/workflows/binaries-darwin.yaml
    secrets: inherit

  # Linux binaries are extracted from natively-built Docker images instead of
  # cross-compiled via goreleaser-cross. This avoids libc++/libstdc++ link
  # errors with barretenberg-go's arm64 static library.
  build-docker:
    name: Build Docker Images
    uses: ./.github/workflows/docker-build.yaml
    secrets: inherit

  extract-linux-binaries:
    name: Extract Linux Binaries
    needs:
      - build-docker
    uses: ./.github/workflows/extract-binaries-linux.yaml
    secrets: inherit

  push-docker:
    name: Push Docker Images
    needs:
      - build-docker
    uses: ./.github/workflows/docker-push.yaml
    secrets: inherit

  docker-scout:
    name: Docker Scout
    needs:
      - build-docker
    uses: ./.github/workflows/docker-scout.yaml
    secrets: inherit

  e2e-tests:
    name: E2E tests
    needs:
      - build-docker
    uses: ./.github/workflows/e2e-tests.yaml
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs:
      - lint
      - update-swagger
      - unit-tests
      - build-darwin
      - extract-linux-binaries
      - push-docker
      - docker-scout
      - e2e-tests
    uses: ./.github/workflows/exec-goreleaser.yaml
    secrets: inherit
