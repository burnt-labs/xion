name: Create Release
# Run for new release tags only

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Golang CI Lint
    uses: ./.github/workflows/golangci-lint.yaml
    secrets: inherit

  update-swagger:
    name: Update Swagger
    uses: ./.github/workflows/update-swagger.yaml
    secrets: inherit

  unit-tests:
    name: Go Unit Tests
    uses: ./.github/workflows/tests.yaml
    secrets: inherit

  build-darwin:
    name: Build Binaries
    uses: ./.github/workflows/binaries-darwin.yaml
    secrets: inherit

  build-linux:
    name: Build Binaries
    uses: ./.github/workflows/binaries-linux.yaml
    secrets: inherit

  build-docker:
    name: Build Docker Images
    needs: build-linux
    uses: ./.github/workflows/docker-build.yaml
    secrets: inherit

  push-docker:
    name: Push Docker Images
    needs: build-docker
    uses: ./.github/workflows/docker-push.yaml
    secrets: inherit

  push-heighliner:
    name: Push Heighliner Images
    needs: build-docker
    uses: ./.github/workflows/heighliner-push.yaml
    secrets: inherit

  docker-scout:
    name: Docker Scout
    needs: build-docker
    uses: ./.github/workflows/docker-scout.yaml
    secrets: inherit

  e2e-tests:
    name: E2E tests
    needs:
      - build-docker
    uses: ./.github/workflows/e2e-tests.yaml
    secrets: inherit

  build-release:
    name: Build Release
    needs:
      - build-linux
      - lint
      - update-swagger
      - unit-tests
      - build-darwin
      - docker-scout
      - e2e-tests
    uses: ./.github/workflows/exec-goreleaser.yaml
    secrets: inherit

  verify-installers:
    name: Verify Package Installers
    needs: build-release
    uses: ./.github/workflows/verify-installers.yaml
    secrets: inherit
