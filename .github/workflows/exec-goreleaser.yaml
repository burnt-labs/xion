name: GoReleaser
# Run for new release tags only

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubicloud-standard-2

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}
          pattern: xiond-*
          merge-multiple: true

      - name: Move artifacts
        run: |
          mkdir -p dist
          mv ${{ runner.temp }}/*/xiond* dist

      - name: Set Go Version
        run: sed -En 's/^go (.*)$/GO_VERSION=\1/p' go.mod >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Import package signing GPG key
        id: import_pkg_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Save GPG and RSA keys
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" > /home/runner/.gnupg/sign.asc
          echo "${{ secrets.PEM_PRIVATE_KEY }}" > /home/runner/.gnupg/sign.pem

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.42.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine goreleaser skip flags
        id: skip-flags
        run: |
          SKIP="fury"
          # When the GitHub release is disabled (non-tag runs), homebrew formula
          # generation fails because it cannot resolve download URLs.
          if [ "${SKIP_GITHUB_RELEASE:-}" = "true" ]; then
            SKIP="fury,homebrew"
          fi
          echo "flags=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        env:
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_OWNER: ${{ github.repository_owner }}
          RELEASE_REPO: ${{ github.event.repository.name }}
          GPG_KEY_ID: ${{ steps.import_pkg_gpg.outputs.keyid }}
          GPG_KEY_PATH: /home/runner/.gnupg/sign.asc
          GPG_FINGERPRINT: ${{ steps.import_pkg_gpg.outputs.fingerprint }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          NFPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          PEM_KEY_PATH: /home/runner/.gnupg/sign.pem
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --config .goreleaser/release.yaml --skip=${{ steps.skip-flags.outputs.flags }}
