name: GoReleaser
# Run for new release tags only

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubicloud-standard-2

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}
          pattern: xiond-*
          merge-multiple: true

      - name: Move artifacts
        run: |
          echo "=== Downloaded artifact contents ==="
          find ${{ runner.temp }} -name 'xiond-*' -type f
          mkdir -p dist
          # Place each binary into the directory structure goreleaser expects:
          #   dist/xiond_<os>_<arch>_<variant>/bin/xiond-<os>-<arch>
          for bin in $(find ${{ runner.temp }} -name 'xiond-*' -type f); do
            filename=$(basename "$bin")
            # Parse os and arch from filename (e.g. xiond-linux-amd64 → linux, amd64)
            os=$(echo "$filename" | cut -d- -f2)
            arch=$(echo "$filename" | cut -d- -f3)
            case "$arch" in
              arm64) variant="v8.0" ;;
              amd64) variant="v1" ;;
              *)     variant="" ;;
            esac
            dest="dist/xiond_${os}_${arch}_${variant}/bin"
            mkdir -p "$dest"
            cp "$bin" "$dest/$filename"
            echo "Placed $filename → $dest/$filename"
          done
          echo "=== Final dist layout ==="
          find dist -type f

      - name: Set Go Version
        run: sed -En 's/^go (.*)$/GO_VERSION=\1/p' go.mod >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Import package signing GPG key
        id: import_pkg_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Save GPG and RSA keys
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" > /home/runner/.gnupg/sign.asc
          echo "${{ secrets.PEM_PRIVATE_KEY }}" > /home/runner/.gnupg/sign.pem

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.42.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        env:
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_OWNER: ${{ github.repository_owner }}
          RELEASE_REPO: ${{ github.event.repository.name }}
          GPG_KEY_ID: ${{ steps.import_pkg_gpg.outputs.keyid }}
          GPG_KEY_PATH: /home/runner/.gnupg/sign.asc
          GPG_FINGERPRINT: ${{ steps.import_pkg_gpg.outputs.fingerprint }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          NFPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          PEM_KEY_PATH: /home/runner/.gnupg/sign.pem
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --config .goreleaser/release.yaml --skip=fury
