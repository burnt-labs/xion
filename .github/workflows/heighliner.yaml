name: Heighliner Build, Push & Scout

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux Binaries
    uses: ./.github/workflows/binaries-linux.yaml
    secrets: inherit

  build-heighliner:
    name: Build Heighliner ${{ matrix.os }}/${{ matrix.arch }}
    needs: build-linux
    runs-on: ${{ matrix.arch == 'arm64' && 'ubicloud-standard-2-arm' || 'ubicloud-standard-2' }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - linux
        arch:
          - amd64
          - arm64

    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: xiond-${{ matrix.os }}-${{ matrix.arch }}
          merge-multiple: true

      - name: Prepare environment
        run: |
          echo "HEIGHLINER_FN=heighliner-${{ matrix.os }}-${{ matrix.arch }}.tar" | tee -a $GITHUB_ENV
          echo "PREBUILT_BINARY=$(find dist -name xiond-${{ matrix.os }}-${{ matrix.arch}})" | tee -a $GITHUB_ENV

      - name: Build Heighliner Image
        id: build-heighliner
        uses: docker/build-push-action@v6
        with:
          context: .
          target: heighliner
          push: false
          load: true
          platforms: ${{ matrix.os }}/${{ matrix.arch }}
          tags: heighliner:${{ matrix.os }}-${{ matrix.arch }}
          build-args: |
            COMMIT=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            PREBUILT_BINARY=${{ env.PREBUILT_BINARY }}

      - name: Save Heighliner Image
        working-directory: ${{ runner.temp }}
        run: |
          docker save heighliner:${{ matrix.os }}-${{ matrix.arch }} > ${{ env.HEIGHLINER_FN }}

      - name: Upload Heighliner Image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.HEIGHLINER_FN }}
          path: ${{ runner.temp }}/${{ env.HEIGHLINER_FN }}
          if-no-files-found: error
          retention-days: 3

  push-heighliner:
    name: Push Heighliner Images
    needs: build-heighliner
    runs-on: ubicloud-standard-2
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare environment
        run: |
          echo "TAG_VERSION=${GITHUB_SHA:0:7}" | tee -a $GITHUB_ENV

      - name: Metadata for heighliner container
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            burntnetwork/heighliner
            ghcr.io/${{ github.repository }}/heighliner
          tags: |
            type=raw,value=${{ env.TAG_VERSION }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Download images
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}
          pattern: heighliner*
          merge-multiple: true

      - name: Load images
        working-directory: ${{ runner.temp }}
        run: |
          for image in heighliner*.tar; do
            PLATFORM=$(basename $image .tar | cut -d- -f2-)
            docker load < $image;
            docker tag heighliner:$PLATFORM burntnetwork/heighliner:$PLATFORM
            docker push burntnetwork/heighliner:$PLATFORM;
          done;

      - name: Prepare manifest vars
        run: |
          IMAGE_TARGETS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< $DOCKER_METADATA_OUTPUT_JSON)
          IMAGE_TAGS=$(docker image ls burntnetwork/heighliner --digests --format json | jq -r '"\(.Repository):\(.Tag)"' | tr '\n' ' ')
          echo "IMAGE_TAGS=$IMAGE_TAGS" | tee -a $GITHUB_ENV
          echo "IMAGE_TARGETS=${IMAGE_TARGETS}" | tee -a $GITHUB_ENV

      - name: Create manifest list and push
        run: |
          eval "docker buildx imagetools create ${IMAGE_TARGETS} ${IMAGE_TAGS}"

      - name: Inspect image
        run: |
          jq -cr '.tags | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON" | \
          xargs -n1 docker buildx imagetools inspect

  docker-scout:
    name: Docker Scout
    needs: build-heighliner
    uses: ./.github/workflows/docker-scout.yaml
    secrets: inherit
