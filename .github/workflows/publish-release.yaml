name: Publish Release

on:
  workflow_dispatch: # manual trigger
  release: # triggered by release event
    types: [published]
    # Notice:
    # ref: https://docs.github.com/en/webhooks/webhook-events-and-payloads#release
    # - "published" fires for both full releases and pre-releases

concurrency: # With concurrency control: Only the latest workflow run executes, previous runs get cancelled
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  trigger-types:
    name: Trigger Types
    uses: ./.github/workflows/trigger-types.yaml
    secrets: inherit

  update-chain-registry:
    name: Update Chain Registry
    uses: burnt-labs/xion-assets/.github/workflows/update_chain_registry.yaml@main
    with:
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  publish-fury:
    name: Publish to Fury
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set Go Version
        run: sed -En 's/^go (.*)$/GO_VERSION=\1/p' go.mod >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --dir dist \
            --pattern 'xiond*'

      - name: Prepare dist layout
        run: |
          # goreleaser prebuilt expects specific directory structure
          for f in dist/xiond-linux-amd64; do
            mkdir -p dist/xiond_linux_amd64_v1/bin
            cp "$f" dist/xiond_linux_amd64_v1/bin/ 2>/dev/null || true
          done
          for f in dist/xiond-linux-arm64; do
            mkdir -p dist/xiond_linux_arm64_v8.0/bin
            cp "$f" dist/xiond_linux_arm64_v8.0/bin/ 2>/dev/null || true
          done
          for f in dist/xiond-darwin-amd64; do
            mkdir -p dist/xiond_darwin_amd64_v1/bin
            cp "$f" dist/xiond_darwin_amd64_v1/bin/ 2>/dev/null || true
          done
          for f in dist/xiond-darwin-arm64; do
            mkdir -p dist/xiond_darwin_arm64_v8.0/bin
            cp "$f" dist/xiond_darwin_arm64_v8.0/bin/ 2>/dev/null || true
          done

      - name: Import package signing GPG key
        id: import_pkg_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Save GPG and RSA keys
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" > /home/runner/.gnupg/sign.asc
          echo "${{ secrets.PEM_PRIVATE_KEY }}" > /home/runner/.gnupg/sign.pem

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser (Fury only)
        uses: goreleaser/goreleaser-action@v6
        env:
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_OWNER: ${{ github.repository_owner }}
          RELEASE_REPO: ${{ github.event.repository.name }}
          SKIP_GITHUB_RELEASE: "true"
          GPG_KEY_ID: ${{ steps.import_pkg_gpg.outputs.keyid }}
          GPG_KEY_PATH: /home/runner/.gnupg/sign.asc
          GPG_FINGERPRINT: ${{ steps.import_pkg_gpg.outputs.fingerprint }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          NFPM_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          PEM_KEY_PATH: /home/runner/.gnupg/sign.pem
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --config .goreleaser/release.yaml --skip=announce,validate

  verify-installers:
    name: Verify Package Installers
    needs: publish-fury
    uses: ./.github/workflows/verify-installers.yaml
    secrets: inherit

  upgrade-testnet:
    name: Testnet Upgrade PR
    if: contains(github.event.release.tag_name, '-rc')
    uses: burnt-labs/xion-testnet-2/.github/workflows/create-release.yml@main
    with:
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  upgrade-mainnet:
    name: Mainnet Upgrade PR
    if: ${{ !contains(github.event.release.tag_name, '-rc') }}
    uses: burnt-labs/xion-mainnet-1/.github/workflows/create-release.yml@main
    with:
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit
