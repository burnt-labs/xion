name: Release Downstream

# Triggers downstream workflows in other repos after a release is published.
# Only runs on the public burnt-labs/xion repo — skipped on forks/security repos.

on:
  release:
    types: [published]

jobs:
  trigger-types:
    name: Trigger Types
    if: github.repository == 'burnt-labs/xion'
    uses: burnt-labs/xion-types/.github/workflows/release.yaml@main
    with:
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  update-chain-registry:
    name: Update Chain Registry
    if: github.repository == 'burnt-labs/xion'
    uses: burnt-labs/xion-assets/.github/workflows/update_chain_registry.yaml@main
    with:
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  upgrade-testnet:
    name: Testnet Upgrade PR
    if: github.repository == 'burnt-labs/xion' && contains(github.event.release.tag_name, '-rc')
    uses: burnt-labs/xion-testnet-2/.github/workflows/create-release.yml@main
    with:
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

  upgrade-mainnet:
    name: Mainnet Upgrade PR
    if: github.repository == 'burnt-labs/xion' && !contains(github.event.release.tag_name, '-rc')
    uses: burnt-labs/xion-mainnet-1/.github/workflows/create-release.yml@main
    with:
      release_tag: ${{ github.event.release.tag_name }}
    secrets: inherit
