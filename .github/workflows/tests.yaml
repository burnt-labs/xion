name: Unit Tests

# reusable workflow, do not add triggers
on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum

      - name: Prepare Environment
        run: |
          sed -En 's/^go (.*)$/GO_VERSION=\1/p' go.mod | tee -a $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install clang and libc++
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends clang libc++-dev libc++abi-dev

      - name: Build Barretenberg wrapper
        run: make barretenberg-build-wrapper

      - name: Build
        run: go build -v ./...

      - name: Test
        run: make test-cover
