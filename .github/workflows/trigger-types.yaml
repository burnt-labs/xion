name: Trigger Types

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v28.0.0). Defaults to the release event tag."
        required: false
        type: string

jobs:
  release-types:
    name: Release Types
    uses: burnt-labs/xion-types/.github/workflows/release.yaml@main
    with:
      release_tag: ${{ inputs.release_tag || github.event.release.tag_name }}
    secrets: inherit
