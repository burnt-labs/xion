# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json

# using this file requires goreleaser pro

version: 2

project_name: xiond

dist: release

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"
  maintainers:
    - "Burnt <support@burnt.com>"
  license: "Apache2.0"
  homepage: "https://xion.burnt.com/"
  description: "Xiond is the Cosmos SDK based blockchain cli/daemon for the Xion Network."

snapshot:
  version_template: "{{ .Version }}-{{ .ShortCommit }}"

# includes:
#   - from_file:
#       path: ./.goreleaser/build.yaml
# Docs: https://goreleaser.com/customization/build/
builds:
  - builder: prebuilt
    binary: xiond
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    goarm64:
      - v8.0
    prebuilt:
      path: "dist/xiond_{{ .Os }}_{{ .Arch }}_{{ with .Arm64 }}{{ . }}{{ end }}{{ with .Amd64 }}{{ . }}{{ end }}/bin/xiond-{{ .Os }}-{{ .Arch }}"

# Docs: https://goreleaser.com/customization/universalbinaries/
universal_binaries:
  - id: xiond

# Docs: https://goreleaser.com/customization/source/
source:
  enabled: true

archives:
  - id: tgz
    formats: [tar.gz]
    meta: false
    wrap_in_directory: false
    strip_binary_directory: false

nfpms:
  - if: '{{ and (eq .Os "linux") (not .IsSnapshot) }}'
    formats:
      - apk
      - deb
      - rpm
    apk:
      signature:
        key_file: "{{ .Env.PEM_KEY_PATH }}"
    deb:
      signature:
        key_file: "{{ .Env.GPG_KEY_PATH }}"
    rpm:
      signature:
        key_file: "{{ .Env.GPG_KEY_PATH }}"

# docs: https://goreleaser.com/customization/checksum/
checksum:
  name_template: "xiond-{{ .Version }}-checksums.txt"
  algorithm: sha256

# not used
# signs:
#   - artifacts: package
#     cmd: gpg2
#     #- args: ["-u", "<key id, fingerprint, email, ...>", "--output", "${signature}", "--detach-sign", "${artifact}"]

# Docs: https://goreleaser.com/customization/fury/
gemfury:
  - account: burnt
    disable: "{{ .IsSnapshot }}"

# Docs: https://goreleaser.com/customization/homebrew/
homebrew_casks:
  - name: xiond
    alternative_names:
      - "xiond@{{ .Version }}"
      - "xiond@{{ .Major }}"
    ids:
      - tgz
    url:
      template: "https://github.com/{{ .Env.RELEASE_OWNER }}/{{ .Env.RELEASE_REPO }}/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
      signing:
        enabled: true
        key: "{{ .Env.GPG_FINGERPRINT }}"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://xion.burnt.com/"
    description: "Xiond is the Cosmos SDK based blockchain cli/daemon for the Xion Network."
    skip_upload: auto
    repository:
      owner: burnt-labs
      name: homebrew-xion
      branch: "{{ .ProjectName }}-v{{ .Version }}"
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: burnt-labs
          name: homebrew-xion
          branch: main

# Docs: https://goreleaser.com/customization/sbom/
sboms:
  - artifacts: archive
    cmd: syft

# Docs: https://goreleaser.com/customization/changelog/
changelog:
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?(bug|fix)(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

# Docs: https://goreleaser.com/customization/release/
release:
  github:
    owner: "{{ .Env.RELEASE_OWNER }}"
    name: "{{ .Env.RELEASE_REPO }}"
  disable: "{{ if index .Env \"SKIP_GITHUB_RELEASE\" }}{{ .Env.SKIP_GITHUB_RELEASE }}{{ else }}false{{ end }}"
  draft: true
  use_existing_draft: true
  replace_existing_artifacts: true
  prerelease: "true"
  make_latest: false
  mode: keep-existing

