syntax = "proto3";
package xion.zk.v1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "xion/zk/v1/params.proto";

option go_package = "github.com/burnt-labs/xion/x/zk/types";

// Query provides defines the gRPC querier service.
service Query {
  // ProofVerify verifies a zk proof for email authentication.
  rpc ProofVerify(QueryVerifyRequest) returns (ProofVerifyResponse) {
    option (google.api.http).get = "/zk/v1/verify";
  }

  // ProofVerifyUltraHonk verifies an UltraHonk (Barretenberg) proof. The vkey
  // is resolved by vkey_name or vkey_id from the store and must be of type
  // ultrahonk.
  rpc ProofVerifyUltraHonk(QueryVerifyUltraHonkRequest)
      returns (ProofVerifyUltraHonkResponse) {
    option (google.api.http) = {
      post : "/burnt/xion/zk/v1/verify-ultrahonk"
      body : "*"
    };
  }

  // ProofVerifyGnark verifies a gnark native Groth16 proof (BN254). The vkey
  // is resolved by vkey_name or vkey_id from the store and must be of type
  // groth16_gnark.
  rpc ProofVerifyGnark(QueryVerifyGnarkRequest)
      returns (ProofVerifyResponse) {
    option (google.api.http) = {
      post: "/burnt/xion/zk/v1/verify-gnark"
      body: "*"
    };
  }

  // VKey queries a verification key by ID
  rpc VKey(QueryVKeyRequest) returns (QueryVKeyResponse) {
    option (google.api.http).get = "/burnt/xion/zk/v1/vkeys/{id}";
  }

  // VKeyByName queries a verification key by name
  rpc VKeyByName(QueryVKeyByNameRequest) returns (QueryVKeyByNameResponse) {
    option (google.api.http).get = "/burnt/xion/zk/v1/vkeys/name/{name}";
  }

  // VKeys queries all verification keys with pagination
  rpc VKeys(QueryVKeysRequest) returns (QueryVKeysResponse) {
    option (google.api.http).get = "/burnt/xion/zk/v1/vkeys";
  }

  // HasVKey checks if a verification key exists by name
  rpc HasVKey(QueryHasVKeyRequest) returns (QueryHasVKeyResponse) {
    option (google.api.http).get = "/burnt/xion/zk/v1/vkeys/exists/{name}";
  }

  // NextVKeyID queries the next available verification key ID
  rpc NextVKeyID(QueryNextVKeyIDRequest) returns (QueryNextVKeyIDResponse) {
    option (google.api.http).get = "/burnt/xion/zk/v1/vkeys/next-id";
  }

  // Params returns zk module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/burnt/xion/zk/v1/params";
  }
}

// SnarkJsProof represents a ZK-SNARK proof in SnarkJS format.
message SnarkJsProof {
  // pi_a defines the first component of the proof.
  repeated bytes pi_a = 1;
  // pi_b defines the second component of the proof.
  repeated bytes pi_b = 2;
  // pi_c defines the third component of the proof.
  repeated bytes pi_c = 3;
}

// QueryVerifyRequest is the request type for the Query/ProofVerify RPC method.
message QueryVerifyRequest {
  // proof is the serialized ZK proof to verify.
  bytes proof = 1;
  // public_inputs is the list of public inputs for the proof.
  repeated string public_inputs = 2;
  // vkey_name is the name of the verification key to use.
  string vkey_name = 3;
  // vkey_id is the ID of the verification key to use.
  uint64 vkey_id = 4;
}
// ProofVerifyResponse defines the response structure for proof verification.
message ProofVerifyResponse {
  // verified indicates whether the proof verification was successful.
  bool verified = 1;
}

// ProofVerifyUltraHonkResponse defines the response structure for UltraHonk
// proof verification.
message ProofVerifyUltraHonkResponse {
  // verified indicates whether the proof verification was successful.
  bool verified = 1;
}

// QueryVerifyUltraHonkRequest is the request for ProofVerifyUltraHonk.
// The verification key is resolved by vkey_name or vkey_id from the store (must
// be ultrahonk type). Proof and public_inputs are raw binary as produced by
// Barretenberg (e.g. bb prove).
message QueryVerifyUltraHonkRequest {
  // proof is the raw UltraHonk proof bytes (e.g. from bb prove -o proof.bin).
  bytes proof = 1;
  // public_inputs is the raw public inputs binary: concatenated 32-byte
  // big-endian field elements, as produced by Barretenberg (e.g. bb
  // write_inputs or the same flow that generates the proof).
  bytes public_inputs = 2;
  // vkey_name is the unique name of the UltraHonk verification key
  string vkey_name = 3;
  // vkey_id is the numeric id of the UltraHonk verification key
  uint64 vkey_id = 4;
}

// QueryVerifyGnarkRequest is the request for ProofVerifyGnark.
// The verification key is resolved by vkey_name or vkey_id from the store (must
// be groth16_gnark type). Proof and public_inputs are gnark native binary format.
message QueryVerifyGnarkRequest {
  // proof is the gnark native Groth16 proof bytes (serialized groth16.Proof).
  bytes proof = 1;
  // public_inputs is the raw public inputs binary: concatenated 32-byte
  // big-endian field elements (fr.Element serialization).
  bytes public_inputs = 2;
  // vkey_name is the unique name of the gnark verification key
  string vkey_name = 3;
  // vkey_id is the numeric id of the gnark verification key
  uint64 vkey_id = 4;
}

// VKey represents a verification key for ZK proof verification.
message VKey {
  // key_bytes is the raw bytes of the verification key.
  bytes key_bytes = 1;
  // name is the unique human-readable identifier for this key.
  string name = 2;
  // description provides additional context about the verification key.
  string description = 3;
  // circuit_hash is the hash of the circuit this key is associated with.
  string circuit_hash = 4;
  // authority is the uploader of the verification key.
  string authority = 5;
  // proof_system identifies the ZK backend: GROTH16 (default) or ULTRA_HONK_ZK.
  ProofSystem proof_system = 6;
}

// QueryVKeyRequest is the request type for the Query/VKey RPC method
message QueryVKeyRequest {
  // id is the unique identifier of the verification key
  uint64 id = 1;
}

// QueryVKeyResponse is the response type for the Query/VKey RPC method
message QueryVKeyResponse {
  // vkey is the verification key
  VKey vkey = 1 [ (gogoproto.nullable) = false ];
}

// QueryVKeyByNameRequest is the request type for the Query/VKeyByName RPC
// method
message QueryVKeyByNameRequest {
  // name is the unique name of the verification key
  string name = 1;
}

// QueryVKeyByNameResponse is the response type for the Query/VKeyByName RPC
// method
message QueryVKeyByNameResponse {
  // vkey is the verification key
  VKey vkey = 1 [ (gogoproto.nullable) = false ];

  // id is the numeric identifier of the verification key
  uint64 id = 2;
}

// QueryVKeysRequest is the request type for the Query/VKeys RPC method
message QueryVKeysRequest {
  // pagination defines an optional pagination for the request
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryVKeysResponse is the response type for the Query/VKeys RPC method
message QueryVKeysResponse {
  // vkeys is the list of all verification keys with their IDs
  repeated VKeyWithID vkeys = 1 [ (gogoproto.nullable) = false ];

  // pagination defines the pagination in the response
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// VKeyWithID combines a verification key with its ID
message VKeyWithID {
  // id is the unique identifier
  uint64 id = 1;

  // vkey is the verification key
  VKey vkey = 2 [ (gogoproto.nullable) = false ];
}

// QueryHasVKeyRequest is the request type for the Query/HasVKey RPC method
message QueryHasVKeyRequest {
  // name is the name of the verification key to check
  string name = 1;
}

// QueryHasVKeyResponse is the response type for the Query/HasVKey RPC method
message QueryHasVKeyResponse {
  // exists indicates whether the verification key exists
  bool exists = 1;

  // id is the numeric identifier if the key exists (0 if not found)
  uint64 id = 2;
}

// QueryNextVKeyIDRequest is the request type for the Query/NextVKeyID RPC
// method
message QueryNextVKeyIDRequest {}

// QueryNextVKeyIDResponse is the response type for the Query/NextVKeyID RPC
// method
message QueryNextVKeyIDResponse {
  // next_id is the next available verification key ID.
  uint64 next_id = 1;
}

// QueryParamsRequest is the request type for the Query/Params RPC method
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method
message QueryParamsResponse {
  // params is the current zk module parameters
  Params params = 1 [ (gogoproto.nullable) = false ];
}
